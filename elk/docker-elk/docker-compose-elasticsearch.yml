version: '3.2'
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.14.1
    volumes:
      - type: bind
        source: ./elasticsearch/config/elasticsearch.yml
        target: /usr/share/elasticsearch/config/elasticsearch.yml
        read_only: true
      - type: volume
        source: elasticsearch
        target: /usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      ES_JAVA_OPTS: "-Xmx4096m -Xms4096m"
      discovery.type: single-node
      ELASTIC_PASSWORD: ZWxhc3RpY3NlYXJjaAo
      TZ: "Asia/Shanghai"
    network_mode: host

  logstash:
    #image: docker.elastic.co/logstash/logstash:7.14.1
    image: docker.elastic.co/logstash/logstash:7.14.1
    volumes:
      - type: bind
        source: ./logstash/config/logstash.yml
        target: /usr/share/logstash/config/logstash.yml
        read_only: true
      - type: bind
        source: ./logstash/pipeline
        target: /usr/share/logstash/pipeline
        read_only: true
      - type: bind
        source: ./logstash/mysql-connector-java-5.1.42.jar
        target: /tmp/mysql-connector-java-5.1.42.jar
        read_only: true
    ports:
      - "5044:5044"
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: "-Xmx4096m -Xms4096m -Duser.timezone=Asia/Shanghai"
      TZ: "Asia/Shanghai"
    network_mode: host

  kibana:
    image: docker.elastic.co/kibana/kibana:7.14.1
    volumes:
      - type: bind
        source: ./kibana/config/kibana.yml
        target: /usr/share/kibana/config/kibana.yml
        read_only: true
    ports:
      - "5601:5601"
    environment:
      TZ: "Asia/Shanghai"
    network_mode: host


volumes:
  elasticsearch:
